name: Report Enrichment Status

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - README.md
      - data/slugs.json
      - public/data/enriched-tools.json
      - scripts/report-enrichment-status.js
      - scripts/generate-tool-pages.js
      - js/parser.js
      - js/category.js
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  report-enrichment-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate markdown report
        id: report
        shell: bash
        run: |
          {
            echo "body<<EOF"
            echo "<!-- enrichment-status-comment -->"
            node scripts/report-enrichment-status.js --markdown
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const marker = '<!-- enrichment-status-comment -->';
            const body = process.env.REPORT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
